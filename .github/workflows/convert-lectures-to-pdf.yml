name: Lecture Notes to PDF
permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'lectures-sources/**/*.md'
      - 'lectures-sources/**/images/**'

jobs:
  converttopdf:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      - name: Convert lectures to PDF
        shell: bash
        run: |
          REPO=$(pwd)
          while IFS= read -r mdfile; do
            dir=$(dirname "$mdfile")
            name=$(basename "$mdfile")
            rel="${dir#lectures-sources}"
            rel="${rel#/}"
            outdir="$REPO/lectures-exported${rel:+/$rel}"
            mkdir -p "$outdir"
            outpdf="$outdir/${name%.md}.pdf"
            diskpdf="$REPO/$dir/${name%.md}.pdf"
            # capture stdout (some versions write there); ignore exit code for now
            (cd "$dir" && md-to-pdf "$name" --launch-options '{"args":["--no-sandbox"]}' < /dev/null) > "$outpdf" || true
            # if stdout was empty, fall back to disk-written PDF
            if [ ! -s "$outpdf" ] && [ -f "$diskpdf" ]; then
              mv "$diskpdf" "$outpdf"
            fi
            [ -s "$outpdf" ] && echo "✓ $mdfile" || echo "✗ Warning: failed to convert $mdfile"
          done < <(find lectures-sources -name "*.md")

      - name: Commit PDF files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add lectures-exported/
          git commit -m "Auto-generate PDFs from lecture notes" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
