name: Docs to PDF
permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'labs-sources/**/*.md'
      - 'labs-sources/**/images/**'

jobs:
  converttopdf:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      - name: Convert labs to PDF
        shell: bash
        run: |
          REPO=$(pwd)
          echo "=== Files found by find ==="
          find labs-sources -name "*.md"
          echo "==========================="
          while IFS= read -r mdfile; do
            dir=$(dirname "$mdfile")
            name=$(basename "$mdfile")
            rel="${dir#labs-sources}"
            rel="${rel#/}"
            outdir="$REPO/labs-exported${rel:+/$rel}"
            mkdir -p "$outdir"
            outpdf="$outdir/${name%.md}.pdf"
            diskpdf="$REPO/$dir/${name%.md}.pdf"
            echo "--- $mdfile ---"
            echo "  outpdf:  $outpdf"
            echo "  diskpdf: $diskpdf"
            stderr_tmp=$(mktemp)
            (cd "$dir" && md-to-pdf "$name" --launch-options '{"args":["--no-sandbox"]}' < /dev/null 2>"$stderr_tmp") > "$outpdf"
            exit_code=$?
            echo "  exit: $exit_code  stdout_bytes: $(wc -c < "$outpdf")  diskpdf_exists: $([ -f "$diskpdf" ] && echo yes || echo no)"
            [ -s "$stderr_tmp" ] && echo "  stderr: $(cat "$stderr_tmp")"
            rm -f "$stderr_tmp"
            if [ ! -s "$outpdf" ] && [ -f "$diskpdf" ]; then
              mv "$diskpdf" "$outpdf"
              echo "  used disk PDF"
            fi
            [ -s "$outpdf" ] && echo "  ✓ $mdfile" || echo "  ✗ Warning: failed to convert $mdfile"
          done < <(find labs-sources -name "*.md")

      - name: Commit PDF files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add labs-exported/
          git commit -m "Auto-generate PDFs from markdown" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
