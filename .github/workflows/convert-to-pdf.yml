name: Docs to PDF
permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'labs-sources/**/*.md'
      - 'labs-sources/**/images/**'

jobs:
  converttopdf:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      - name: Convert labs to PDF
        run: |
          REPO=$(pwd)
          find labs-sources -name "*.md" | while read mdfile; do
            dir=$(dirname "$mdfile")
            name=$(basename "$mdfile")
            rel=$(realpath --relative-to="labs-sources" "$dir")
            outdir="$REPO/labs-exported/$rel"
            mkdir -p "$outdir"
            (cd "$dir" && md-to-pdf "$name" --launch-options '{"args":["--no-sandbox"]}') \
              && mv "$dir/${name%.md}.pdf" "$outdir/${name%.md}.pdf" \
              || echo "Warning: failed to convert $mdfile"
          done

      - name: Commit PDF files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add labs-exported/
          git commit -m "Auto-generate PDFs from markdown" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
